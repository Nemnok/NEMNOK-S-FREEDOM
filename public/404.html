<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA redirect: convert path into hash-based route
      var repo = '/NEMNOK-S-FREEDOM';
      var path = window.location.pathname;
      if (path.indexOf(repo) === 0) {
        path = path.slice(repo.length);
      }
      var search = window.location.search || '';
      window.location.replace(
        repo + '/#' + (path || '/') + search
      );
    </script>
  </head>
  <body></body>
</html>
